<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Input</title>
</head>

<body>
    <div>
        Text: <input type="text">
    </div>
    <div>
        Password: <input type="password">
    </div>
    <div>
        Email: <input type="email">
    </div>
    <div>
        Number: <input type="number">
    </div>
    <div>
        Date: <input type="date">
    </div>
    <div>
        Time: <input type="time">
    </div>
    <div>
        Checkbox: <input type="checkbox">
    </div>
    <div>
        Radio: <input type="radio" name="radio-group">
    </div>
    <div>
        File: <input type="file">
    </div>
    <br>
    <br>
    <input type="text" value="Belajar dasar Pemrograman">
    <button>Submit</button>

    <div>
        <textarea name="message" id="message" rows="6"
            cols="18">Saya adalah seorang web developer handal diseluruh indonesia</textarea>
        <button>Kirim saja Bolo</button>
    </div>
    <br>
    <br>
    <div>
        <label for="username">Username:</label><br>
        <input type="text" id="username">
    </div>
    <div>
        <label for="password">password</label><br>
        <input type="password" id="password" style="width: 200px; " placeholder="**********" required>
    </div>
    <br>
    <br>
    <form>
        <div>
            <label for="username">Username :</label><br>
            <input type="text" id="username">
        </div>
        <div>
            <label for="password">Password</label>
            <br />
            <input type="password" id="password" />
        </div>
        <button type="submit">Login</button>
    </form>
</body>

</html>
